<!DOCTYPE html>
<html>
<head>
  <title>Employee Management System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; }
    .navbar { background: #1976d2; padding: 14px 30px; display: flex; justify-content: space-between; align-items: center; }
    .navbar h1 { color: white; font-size: 20px; }
    .navbar a { color: white; text-decoration: none; margin-left: 20px; font-size: 14px; }
    .navbar a:hover { text-decoration: underline; }
    .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
    .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; }
    .btn-primary { background: #1976d2; color: white; }
    .btn-danger  { background: #e53935; color: white; }
    .btn-warning { background: #fb8c00; color: white; }
    .btn-secondary { background: #757575; color: white; }
    .btn:hover { opacity: 0.85; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
    th { background: #1976d2; color: white; padding: 12px; text-align: left; font-size: 14px; }
    td { padding: 11px 12px; border-bottom: 1px solid #eee; font-size: 14px; color: #333; }
    tr:hover { background: #f5f5f5; }
    .card { background: white; border-radius: 10px; padding: 30px; max-width: 550px; margin: 0 auto; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .page-header h2 { font-size: 22px; color: #1a1a1a; }
    .search-box { padding: 8px 14px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; width: 260px; }
    .msg { padding: 10px 16px; border-radius: 6px; margin-bottom: 16px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="navbar">
    <h1>Employee MS</h1>
    <div>
      <a href="/">Employees</a>
      <a href="/departments/">Departments</a>
    </div>
  </div>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
